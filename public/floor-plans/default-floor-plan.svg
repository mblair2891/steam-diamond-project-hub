<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a3140" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
  </defs>
  <!-- Outer shell -->
  <rect width="1400" height="1000" fill="url(#floor)"/>
  <rect width="1400" height="1000" fill="url(#grid)" opacity="0.45"/>
  <!-- Building footprint -->
  <rect x="80" y="60" width="1240" height="880" rx="4" fill="#1c222d" stroke="#4a5568" stroke-width="6"/>
  <!-- Outer walls -->
  <rect x="80" y="60" width="1240" height="880" rx="4" fill="none" stroke="#e8b84a" stroke-width="3" opacity="0.35"/>

  <!-- DINING -->
  <rect x="110" y="90" width="620" height="520" rx="2" fill="#222833" stroke="#3a4458" stroke-width="2"/>
  <text x="420" y="120" text-anchor="middle" fill="#8b93a7" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="2">DINING ROOM</text>

  <!-- BAR -->
  <rect x="760" y="90" width="530" height="280" rx="2" fill="#222833" stroke="#3a4458" stroke-width="2"/>
  <text x="1025" y="120" text-anchor="middle" fill="#8b93a7" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="2">BAR</text>
  <!-- Bar counter outline -->
  <rect x="800" y="160" width="450" height="56" rx="6" fill="none" stroke="#6cb6ff" stroke-width="2" stroke-dasharray="8 6" opacity="0.7"/>
  <text x="1025" y="195" text-anchor="middle" fill="#6cb6ff" font-family="system-ui,sans-serif" font-size="12" opacity="0.8">Bar counter zone</text>
  <rect x="1180" y="230" width="70" height="110" rx="4" fill="none" stroke="#6cb6ff" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.55"/>
  <text x="1215" y="290" text-anchor="middle" fill="#6cb6ff" font-family="system-ui,sans-serif" font-size="10" opacity="0.7">Back bar</text>

  <!-- KITCHEN / SMOKE -->
  <rect x="760" y="400" width="530" height="360" rx="2" fill="#222833" stroke="#3a4458" stroke-width="2"/>
  <text x="1025" y="430" text-anchor="middle" fill="#8b93a7" font-family="system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="2">KITCHEN / PIT</text>
  <rect x="820" y="470" width="200" height="120" rx="4" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="8 6" opacity="0.65"/>
  <text x="920" y="535" text-anchor="middle" fill="#f472b6" font-family="system-ui,sans-serif" font-size="12" opacity="0.8">Hood / pit zone</text>
  <rect x="1060" y="470" width="160" height="80" rx="4" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="1140" y="515" text-anchor="middle" fill="#f9a8d4" font-family="system-ui,sans-serif" font-size="11" opacity="0.7">Prep</text>
  <rect x="820" y="630" width="120" height="80" rx="4" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="880" y="675" text-anchor="middle" fill="#f9a8d4" font-family="system-ui,sans-serif" font-size="11" opacity="0.7">Coolers</text>
  <rect x="980" y="630" width="180" height="80" rx="4" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="1070" y="675" text-anchor="middle" fill="#f9a8d4" font-family="system-ui,sans-serif" font-size="11" opacity="0.7">Dish / sink</text>

  <!-- RESTROOMS -->
  <rect x="110" y="640" width="280" height="260" rx="2" fill="#222833" stroke="#3a4458" stroke-width="2"/>
  <text x="250" y="670" text-anchor="middle" fill="#8b93a7" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="1">RESTROOMS</text>
  <line x1="250" y1="690" x2="250" y2="880" stroke="#3a4458" stroke-width="2"/>
  <text x="180" y="790" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">W</text>
  <text x="320" y="790" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">M</text>

  <!-- ENTRY / HOST -->
  <rect x="420" y="640" width="310" height="260" rx="2" fill="#222833" stroke="#3a4458" stroke-width="2"/>
  <text x="575" y="670" text-anchor="middle" fill="#8b93a7" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="1">ENTRY / HOST</text>
  <path d="M 520 900 L 630 900" stroke="#3ecf8e" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <text x="575" y="880" text-anchor="middle" fill="#3ecf8e" font-family="system-ui,sans-serif" font-size="12" font-weight="600">MAIN ENTRANCE</text>
  <rect x="500" y="720" width="150" height="50" rx="4" fill="none" stroke="#3ecf8e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.55"/>
  <text x="575" y="750" text-anchor="middle" fill="#7de0b0" font-family="system-ui,sans-serif" font-size="11" opacity="0.8">Host stand</text>

  <!-- Dimension notes -->
  <text x="700" y="980" text-anchor="middle" fill="#5a6478" font-family="system-ui,sans-serif" font-size="13">Steam × Diamond · Default floor plate (upload your plan to replace)</text>
</svg>
